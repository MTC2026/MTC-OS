<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MTC.OS</title>
  <meta name="viewport" content="width=1024,user-scalable=no">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; user-select: none; font-family: Segoe UI, Arial, sans-serif; background: #202346; }
    #boot { position: fixed; z-index: 9999; top:0;left:0;width:100vw;height:100vh; background: #1a1940; color: #fff; display: flex; flex-direction:column;align-items: center;justify-content: center; transition: opacity 0.7s; font-size: 2em;}
    #desktop { width: 100vw; height: 100vh; background: linear-gradient(120deg, #202346, #395bb8 120%); position: relative; overflow: hidden; }
    .taskbar { position: absolute; bottom:0; left:0; right:0; height:40px; background: rgba(33,32,74,0.93); display:flex; align-items: center; border-top: 1.5px solid #243; z-index: 100; }
    .taskbar-icon { padding: 0 14px; height:40px; display:flex; align-items:center; cursor:pointer; color:#fff; font-size:1em; }
    .taskbar-icon.active {background:#4448d2;}
    .taskbar-clock { margin-left: auto; padding: 0 20px; font-variant-numeric: tabular-nums;font-size: 1.1em; }
    .desktop-icons { position: absolute; top: 34px; left:34px; display: flex; flex-wrap: wrap; gap: 30px; z-index:1;}
    .app-icon { width:76px; height:76px; border-radius:12px; background:rgba(255,255,255,0.10); color:#fff; border:none; font-size:1.6em; display:flex; flex-direction:column; align-items:center; justify-content: center; cursor:pointer; transition: box-shadow .18s; box-shadow:0 3px 12px 0 #0002;}
    .app-icon:hover { box-shadow:0 6px 18px 0 #0BE5; background:#5a80ff33;}
    .app-icon span { margin-top: 5px; font-size: 15px;}
    .window { position:absolute; min-width:340px; min-height:130px; width:410px; height:270px; background:#fff; border-radius:10px; box-shadow:0 4px 32px #0af3; display:flex; flex-direction:column; top:100px; left:200px; overflow:hidden; resize: both; z-index: 10; border: 2.5px solid #375adf88; animation: fadeIn .27s;}
    @keyframes fadeIn { from{opacity: 0;} to{opacity: 1;} }
    .window-header { height:34px; background:#375adf; color:#fff; display:flex; align-items: center; justify-content: space-between; cursor:move; padding: 0 10px; font-weight: 500; border-bottom:1.5px solid #243; flex-shrink:0;}
    .window-content { flex:1; background:#f3f7ff; padding:16px; overflow: auto;}
    .window-header .close-btn { background:transparent; border:none; color:#fff; font-size:1.3em; font-weight: bold; cursor:pointer; margin-left:12px;}
    textarea, input, select, button { font-family: inherit; }
    .widget-notes { width: 100%; height: 110px; font-size: 1.18em; }
    .widget-calculator input { width: calc(100% - 12px); font-size: 1.3em; text-align:right; margin-bottom: 7px;}
    .widget-calculator button { font-size:1.15em; margin:2px;width:42px;height:36px;}
    .widget-todo input[type=text] { width:170px; font-size:1em; }
    .widget-todo ul{ margin-top:7px; }
    .widget-todo li{margin-bottom:3.5px;cursor:pointer;}
    .widget-calendar table {border-collapse: collapse;}
    .widget-calendar th,.widget-calendar td{border:1px solid #bbb;padding:4px 7px;text-align:center; font-size: 1em;}
    /* MTC Browser style */
    .mtc-browser-search { margin-bottom: 14px; }
    .mtc-browser-search input[type="text"] { width: 60%; padding: 7px; font-size: 1em; }
    .mtc-browser-search select { font-size:1em; padding: 5px; }
    .mtc-browser-search button { font-size:1em; padding: 7px 17px; margin-left:12px;}
    .link-apps { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .link-apps button { border:none; background:none; color:#395bb8; font-size:1.1em; cursor:pointer; text-decoration:underline;}
  </style>
</head>
<body>
  <div id="boot">
    <div style="font-size:2.6em;font-weight:500;margin-bottom:22px;">MTC.OS</div>
    <div style="font-size:1.09em;">Booting up&hellip;</div>
  </div>
  <div id="desktop" style="display:none;">
    <div class="desktop-icons" id="desktop-icons"></div>
    <div class="taskbar" id="taskbar"></div>
  </div>

  <template id="win-tmpl">
    <div class="window" style="z-index:20;">
      <div class="window-header">
        <span class="win-title">App</span>
        <button class="close-btn" tabindex="-1">&times;</button>
      </div>
      <div class="window-content"></div>
    </div>
  </template>

  <script>
    // List of apps (id, title, icon, type)
    const APPS = [
      {id:"github", title:"GitHub", icon:"🐱", type:"link", url:"https://github.com/"},
      {id:"wikipedia", title:"Wikipedia", icon:"📚", type:"link", url:"https://wikipedia.org/"},
      {id:"mtcbrowser", title:"MTC Browser", icon:"🌐", type:"mtcbrowser"},
      {id:"calendar", title:"Calendar", icon:"📅", type:"calendar"},
      {id:"notes", title:"Notes", icon:"📝", type:"notes"},
      {id:"weather", title:"Weather", icon:"🌤️", type:"weather"},
      {id:"clock", title:"Clock", icon:"⏰", type:"clock"},
      {id:"todo", title:"To-Do", icon:"✔️", type:"todo"},
      {id:"calculator", title:"Calculator", icon:"🧮", type:"calculator"},
      {id:"settings", title:"Settings", icon:"⚙️", type:"settings"},
      {id:"about", title:"About MTC.OS", icon:"💡", type:"about"}
    ];

    // State
    const windows = [];
    function closeWindow(id) {
      const idx = windows.findIndex(w => w.app.id === id);
      if(idx !== -1) {
        const win = windows[idx];
        win.el.remove();
        windows.splice(idx, 1);
        renderTaskbar();
      }
    }

    // Desktop Icons
    const iconBar = document.getElementById("desktop-icons");
    APPS.slice(0,10).forEach(app => {
      const b = document.createElement("button");
      b.className = "app-icon";
      b.innerHTML = `<div style="font-size:2.4em;">${app.icon}</div><span>${app.title}</span>`;
      // If external link, open in new tab
      if(app.type==="link") {
        b.onclick = (e) => {
          window.open(app.url, '_blank', 'noopener');
        };
      } else {
        b.onclick = () => launchApp(app);
      }
      iconBar.appendChild(b);
    });

    // Window Creation
    function launchApp(app) {
      // Only one instance per app
      let win = windows.find(w => w.app.id === app.id);
      if(win) {
        win.el.style.zIndex = getNextZ();
        win.el.focus();
        return;
      }
      const tmpl = document.getElementById('win-tmpl');
      const node = tmpl.content.cloneNode(true);
      const winEl = node.querySelector('.window');
      winEl.style.top = (Math.random()*150 + 60) + "px";
      winEl.style.left = (Math.random()*350 + 110) + "px";
      winEl.querySelector('.win-title').innerText = app.title;
      winEl.querySelector('.close-btn').onclick = () => closeWindow(app.id);
      winEl.onclick = ()=>{ winEl.style.zIndex = getNextZ(); }
      makeDraggable(winEl);

      // Add content
      const content = winEl.querySelector('.window-content');
      if(app.type === "mtcbrowser") {
        content.appendChild(mtcBrowserWidget());
      }
      else {
        content.appendChild(widgetFor(app.type));
      }

      document.getElementById("desktop").appendChild(winEl);
      windows.push({app, el:winEl});
      winEl.style.zIndex = getNextZ();
      renderTaskbar();
    }

    let _z = 20;
    function getNextZ() { return ++_z; }

    function renderTaskbar() {
      const bar = document.getElementById("taskbar");
      bar.innerHTML = "";
      windows.forEach(w => {
        const btn = document.createElement("div");
        btn.className = "taskbar-icon"+(w.el.style.zIndex>=_z?" active":"");
        btn.innerHTML = `${w.app.icon} ${w.app.title}`;
        btn.onclick = ()=>{
          w.el.style.zIndex = getNextZ();
          w.el.focus();
        };
        bar.appendChild(btn);
      });
      const clk = document.createElement("div");
      clk.className = "taskbar-clock";
      clk.id = "taskbar-clock";
      bar.appendChild(clk);
      updateClock();
    }

    function updateClock() {
      const clk = document.getElementById("taskbar-clock");
      if(clk) clk.textContent = (new Date()).toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    setTimeout(() => {
      document.getElementById("boot").style.opacity = 0;
      setTimeout(() => {
        document.getElementById("boot").style.display="none";
        document.getElementById("desktop").style.display="";
      }, 700);
    }, 1900);

    function makeDraggable(win) {
      const header = win.querySelector('.window-header');
      let isDragging = false, offsetX=0, offsetY=0;
      header.onmousedown = function(e) {
        isDragging = true;
        const rect = win.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        win.style.zIndex = getNextZ();
        document.body.style.userSelect = "none";
      };
      document.addEventListener('mousemove', function(e){
        if(isDragging) {
          win.style.left = Math.max(0,Math.min(window.innerWidth-180, e.clientX-offsetX))+"px";
          win.style.top = Math.max(0,Math.min(window.innerHeight-100, e.clientY-offsetY))+"px";
        }
      });
      document.addEventListener('mouseup', ()=>{ isDragging=false; document.body.style.userSelect=""; });
    }

    // Widgets
    function widgetFor(type) {
      if(type === "clock") {
        let d = document.createElement('div');
        d.style.fontSize='1.6em';
        setInterval(()=>{ d.textContent=(new Date()).toLocaleTimeString(); }, 200);
        d.textContent = (new Date()).toLocaleTimeString();
        return d;
      }
      if(type === "about") {
        let d = document.createElement('div');
        d.innerHTML = `<b>MTC.OS</b><br>Browser OS Demo<br><small>By MTC2026</small>`;
        return d;
      }
      if(type === "notes") {
        let d = document.createElement('textarea');
        d.className="widget-notes";
        d.placeholder="Write your notes here...";
        d.value = localStorage.getItem("mtcnotes")||"";
        d.oninput = () => { localStorage.setItem("mtcnotes", d.value); };
        return d;
      }
      if(type === "weather") {
        let d = document.createElement('div');
        d.innerHTML = `<b>Sunny</b> <br>Temp: 20°C<br><small>Static demo widget.</small>`;
        return d;
      }
      if(type === "settings") {
        let d = document.createElement('div');
        d.innerHTML = `<label>
            Theme: <select id="themeSel">
              <option value="default">Default Blue</option>
              <option value="dark">Dark Mode</option>
            </select>
          </label>`;
        d.querySelector("#themeSel").onchange = e=>{
          document.body.style.background = e.target.value==="dark"?"#161827":"#202346";
        };
        return d;
      }
      if(type === "calculator") {
        let d = document.createElement('div');
        d.className="widget-calculator";
        d.innerHTML = `<input type="text" id="calc_inp" readonly placeholder="0"/>
          <br>
          <div>
            <button>7</button><button>8</button><button>9</button><button>/</button><br>
            <button>4</button><button>5</button><button>6</button><button>*</button><br>
            <button>1</button><button>2</button><button>3</button><button>-</button><br>
            <button>0</button><button>.</button><button>=</button><button>+</button>
            <br><button id="cbtn">C</button>
          </div>`;
        const inp = d.querySelector('#calc_inp');
        let expr = "";
        d.querySelectorAll('button').forEach(b=>{
          b.onclick = ()=>{
            if(b.textContent=="C") expr="";
            else if(b.textContent=="="){
              try{ expr=eval(expr).toString();}catch{expr="Error";}
            } else expr+=b.textContent;
            inp.value = expr;
          };
        });
        return d;
      }
      if(type === "todo") {
        let d = document.createElement('div');
        d.className = "widget-todo";
        d.innerHTML = `<input type="text" id="todo_inp" placeholder="Add task"/><button id="todo_add">Add</button>
          <ul id="todo_list"></ul>`;
        const inp = d.querySelector("#todo_inp");
        const list = d.querySelector("#todo_list");
        let todos = JSON.parse(localStorage.getItem("mtctodo") || "[]");
        function rerender() {
          list.innerHTML="";
          todos.forEach((t,i)=>{
            let li=document.createElement("li");
            li.textContent = t;
            li.onclick=()=>{ todos.splice(i,1); localStorage.setItem("mtctodo",JSON.stringify(todos)); rerender();}
            list.appendChild(li);
          });
        }
        d.querySelector("#todo_add").onclick = ()=>{
          if(inp.value.trim()){ todos.push(inp.value.trim()); inp.value=""; localStorage.setItem("mtctodo",JSON.stringify(todos)); rerender();}
        };
        rerender();
        return d;
      }
      if(type === "calendar") {
        let d = document.createElement('div');
        d.className = "widget-calendar";
        const today = new Date();
        function renderCalendar(year, month){
          d.innerHTML = `<b>${today.toLocaleString('default', { month: 'long' })} ${year}</b><br>`;
          const firstDay = new Date(year,month,1).getDay();
          const lastDate = new Date(year,month+1,0).getDate();
          let tbl = "<table><tr>";
          const days = ['S','M','T','W','T','F','S'];
          days.forEach(day=>tbl += `<th>${day}</th>`);
          tbl+="</tr><tr>";
          for(let i=0;i<firstDay;i++) tbl+="<td></td>";
          for(let d=1;d<=lastDate;d++){
            tbl += `<td${d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()?' style="background:#5a80ff22;"':''}>${d}</td>`;
            if((firstDay+d)%7===0) tbl+="</tr><tr>";
          }
          tbl+="</tr></table>";
          d.innerHTML += tbl;
        }
        renderCalendar(today.getFullYear(), today.getMonth());
        return d;
      }
      return document.createElement('div');
    }

    // MTC Browser Widget
    function mtcBrowserWidget() {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = `
        <form class="mtc-browser-search">
          <input type="text" id="mtc-search-q" placeholder="Enter your search..." autofocus/>
          <select id="mtc-search-engine">
            <option value="google">Google</option>
            <option value="bing">Bing</option>
          </select>
          <button type="submit">Search</button>
        </form>
        <div style="margin-top:13px;font-size:1.05em;color:#444;">
          Search will open in your chosen search engine in a new tab.
        </div>
      `;
      wrapper.querySelector("form").onsubmit = function(e) {
        e.preventDefault();
        const q = wrapper.querySelector("#mtc-search-q").value.trim();
        const engine = wrapper.querySelector("#mtc-search-engine").value;
        if(!q) return;
        let searchUrl = '';
        if(engine==="bing") {
          searchUrl = 'https://www.bing.com/search?q='+encodeURIComponent(q);
        } else {
          searchUrl = 'https://www.google.com/search?q='+encodeURIComponent(q);
        }
        window.open(searchUrl, "_blank", "noopener");
      };
      return wrapper;
    }
  </script>
</body>
</html>
